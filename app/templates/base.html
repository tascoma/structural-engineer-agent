<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Structural Engineer AI{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚙</span>
          <span class="logo-text">StructAI</span>
        </div>
        <form method="post" action="/conversations/new" style="margin:0">
          <button type="submit" class="btn-new-chat">+ New Chat</button>
        </form>
      </div>

      <nav class="conversation-list">
        {% block sidebar_conversations %}{% endblock %}
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
